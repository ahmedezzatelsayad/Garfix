# EA-011 FIX: CI/CD pipeline for GarfiX EOS
# Runs on every push and PR to ensure code quality and prevent regressions.
# Steps: install → type-check → lint → test → build

name: GarfiX CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: garfix_test
          POSTGRES_PASSWORD: garfix_test_pass
          POSTGRES_DB: garfix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://garfix_test:garfix_test_pass@localhost:5432/garfix_test?schema=public"
      JWT_SECRET: "ci-test-jwt-secret-at-least-16-chars"
      JWT_REFRESH_SECRET: "ci-test-refresh-secret-at-least-16-chars"
      FOUNDER_EMAIL: "founder@test.com"
      PAYMENTS_ENC_KEY: "ci-test-encryption-key-at-least-32-chars!"
      NODE_ENV: "test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Run Prisma migrations
        run: bun run db:deploy

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build
