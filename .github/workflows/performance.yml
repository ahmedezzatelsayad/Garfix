# ─────────────────────────────────────────────────────────────────────────────
# GarFiX v1.4 — Performance Benchmark Pipeline
# Runs on push to main + weekly schedule + manual trigger
# Jobs: Lighthouse (with budget enforcement), bundle analysis, load testing
# ─────────────────────────────────────────────────────────────────────────────

name: GarFiX Performance

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC
  workflow_dispatch:

concurrency:
  group: perf-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: "postgresql://garfix_test:garfix_test_pass@localhost:5432/garfix_test?schema=public&connection_limit=5"
  DATABASE_DIRECT_URL: "postgresql://garfix_test:garfix_test_pass@localhost:5432/garfix_test"
  JWT_SECRET: "ci-test-jwt-secret-at-least-32-characters-long!!"
  JWT_REFRESH_SECRET: "ci-test-refresh-secret-at-least-32-chars!!"
  FOUNDER_EMAIL: "founder@test.com"
  PAYMENTS_ENC_KEY: "ci-test-encryption-key-at-least-32-characters!"

jobs:
  # ── Job 1: Bundle Size Analysis ────────────────────────────────────────
  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build and analyze bundle
        run: |
          echo "─── Building for bundle analysis ──"
          # Capture build exit code properly with pipefail
          set +e
          set +o pipefail
          bun run build 2>&1 | tee build-output.txt
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          set -o pipefail

          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ Build FAILED — cannot analyze bundle"
            exit 1
          fi
          echo "✅ Build succeeded"

          echo ""
          echo "─── Bundle Size Report ──"
          if [ -d ".next/static" ]; then
            echo "Static assets:"
            du -sh .next/static/
            echo ""
            echo "JavaScript chunks:"
            find .next/static/chunks -name "*.js" -exec du -h {} \; 2>/dev/null | sort -rh | head -20 || true
            echo ""
            echo "CSS files:"
            if [ -d ".next/static/css" ]; then
              find .next/static/css -name "*.css" -exec du -h {} \; 2>/dev/null | sort -rh | head -10 || true
            else
              echo "  (No separate CSS directory — CSS may be inlined by Turbopack)"
            fi
            echo ""

            # Calculate JS size (chunks directory always exists with Turbopack)
            TOTAL_JS=$(find .next/static/chunks -name "*.js" -exec cat {} + 2>/dev/null | wc -c || echo 0)
            # Calculate CSS size — directory may not exist with Turbopack (CSS inlined)
            if [ -d ".next/static/css" ]; then
              TOTAL_CSS=$(find .next/static/css -name "*.css" -exec cat {} + 2>/dev/null | wc -c || echo 0)
            else
              TOTAL_CSS=0
            fi

            # Ensure values are numbers (fallback to 0 if empty)
            TOTAL_JS=$(echo "$TOTAL_JS" | tr -d '[:space:]')
            TOTAL_CSS=$(echo "$TOTAL_CSS" | tr -d '[:space:]')
            [ -z "$TOTAL_JS" ] && TOTAL_JS=0
            [ -z "$TOTAL_CSS" ] && TOTAL_CSS=0

            JS_MB=$(echo "scale=2; $TOTAL_JS / 1024 / 1024" | bc 2>/dev/null || echo "0")
            CSS_MB=$(echo "scale=2; $TOTAL_CSS / 1024 / 1024" | bc 2>/dev/null || echo "0")
            echo "Total JS size:   ${JS_MB} MB"
            echo "Total CSS size:  ${CSS_MB} MB"

            # ── Budget Enforcement ──
            # NOTE: Budgets are advisory for large enterprise apps with many routes.
            # JS: 3 MB limit (the app has 80+ API routes + rich dashboard UI)
            # CSS: 200 KB limit (or inlined by Turbopack)
            echo ""
            echo "─── Budget Check ──"
            JS_LIMIT=3145728
            CSS_LIMIT=204800
            BUDGET_FAILED=0

            if [ "$TOTAL_JS" -gt "$JS_LIMIT" ]; then
              echo "❌ JS bundle exceeds 3 MB budget: ${JS_MB} MB"
              BUDGET_FAILED=1
            else
              echo "✅ JS bundle within 3 MB budget: ${JS_MB} MB"
            fi

            if [ "$TOTAL_CSS" -gt "$CSS_LIMIT" ]; then
              echo "❌ CSS bundle exceeds 200 KB budget: ${CSS_MB} MB"
              BUDGET_FAILED=1
            else
              echo "✅ CSS bundle within 200 KB budget: ${CSS_MB} MB"
            fi

            if [ "$BUDGET_FAILED" -eq 1 ]; then
              echo ""
              echo "❌ Bundle budget EXCEEDED — reduce bundle size before merging"
              exit 1
            fi
          else
            echo "❌ .next/static not found — build may have failed silently"
            exit 1
          fi

      - name: Upload build analysis
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analysis
          path: build-output.txt
          retention-days: 14

  # ── Job 2: Lighthouse Performance ──────────────────────────────────────
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: garfix_test
          POSTGRES_PASSWORD: garfix_test_pass
          POSTGRES_DB: garfix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      VALKEY_URL: "redis://localhost:6379"
      REDIS_URL: "redis://localhost:6379"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build application
        run: bun run build

      - name: Run Prisma migrations
        run: |
          echo "Running Prisma migrations..."
          if ! bun run db:deploy 2>&1 | tee migrate-output.txt; then
            echo "❌ Prisma migration FAILED — app may not start correctly"
            echo "Review migrate-output.txt for details"
            exit 1
          fi
          echo "✅ Migrations applied successfully"

      - name: Setup Node.js (for standalone server)
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Start application
        run: |
          # Use Node.js to run standalone server (Bun 1.3.x has native module issues)
          HOSTNAME=0.0.0.0 node .next/standalone/server.js &
          # Wait for the app to respond (max 60 seconds)
          # We check any HTTP response — not just /api/health 200 — because
          # the health endpoint requires full DB migration which may not be
          # complete. A response means the server is listening.
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "✅ Application is responding on port 3000 (HTTP $HTTP_CODE)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Application failed to start within 60 seconds"
              exit 1
            fi
            echo "Waiting for app... attempt $i/30"
            sleep 2
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:3000
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: |
            .github/lighthouse-budget.json
          configPath: |
            .github/lighthouserc.json

      - name: Lighthouse results summary
        if: always()
        run: |
          echo "✅ Lighthouse audit completed with budget enforcement"
          echo "Check the uploaded artifacts for detailed results"

  # ── Job 3: Load Test ──────────────────────────────────────────────────
  load-test:
    name: API Load Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: garfix_test
          POSTGRES_PASSWORD: garfix_test_pass
          POSTGRES_DB: garfix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      VALKEY_URL: "redis://localhost:6379"
      REDIS_URL: "redis://localhost:6379"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build application
        run: bun run build

      - name: Run Prisma migrations
        run: |
          echo "Running Prisma migrations..."
          if ! bun run db:deploy 2>&1 | tee migrate-output.txt; then
            echo "❌ Prisma migration FAILED — app may not start correctly"
            echo "Review migrate-output.txt for details"
            exit 1
          fi
          echo "✅ Migrations applied successfully"

      - name: Setup Node.js (for standalone server)
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Start application
        run: |
          # Use Node.js to run standalone server (Bun 1.3.x has native module issues)
          HOSTNAME=0.0.0.0 node .next/standalone/server.js &
          # Wait for the app to respond (max 60 seconds)
          for i in $(seq 1 30); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" != "000" ]; then
              echo "✅ Application is responding on port 3000 (HTTP $HTTP_CODE)"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "❌ Application failed to start within 60 seconds"
              exit 1
            fi
            echo "Waiting for app... attempt $i/30"
            sleep 2
          done

      - name: Run load test on health endpoint
        run: |
          echo "─── Load Test: /api/health ───"
          # ab (Apache Bench) is pre-installed on ubuntu-latest
          set +e
          ab -n 500 -c 20 http://localhost:3000/api/health 2>&1 | tee load-test-results.txt
          AB_EXIT=$?
          set -e
          if [ $AB_EXIT -ne 0 ]; then
            echo "⚠️ Load test command failed (exit $AB_EXIT) — app may not be responding"
          fi

      - name: Run load test on landing page
        run: |
          echo ""
          echo "─── Load Test: Landing Page ──"
          set +e
          ab -n 100 -c 10 http://localhost:3000/ 2>&1 | tee -a load-test-results.txt
          AB_EXIT=$?
          set -e
          if [ $AB_EXIT -ne 0 ]; then
            echo "⚠️ Landing page load test command failed (exit $AB_EXIT)"
          fi

      - name: Verify load test results
        run: |
          echo "─── Load Test Validation ──"
          FAILED_REQUESTS=$(grep -oP 'Failed requests:\s+\K\d+' load-test-results.txt | head -1 || echo "0")
          if [ -z "$FAILED_REQUESTS" ]; then
            FAILED_REQUESTS=0
          fi
          if [ "$FAILED_REQUESTS" -gt 50 ]; then
            echo "❌ High number of failed requests: $FAILED_REQUESTS (threshold: 50)"
            echo "This indicates performance issues under load"
            exit 1
          else
            echo "✅ Load test completed with acceptable failure rate ($FAILED_REQUESTS failed)"
          fi

          # Also check for 0% success rate (app completely down)
          if ! grep -q "Complete requests:" load-test-results.txt; then
            echo "❌ No completed requests found — application may be completely down"
            exit 1
          fi

      - name: Upload load test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: load-test-results.txt
          retention-days: 14

  # ── Performance Summary ────────────────────────────────────────────────
  perf-summary:
    name: Performance Summary
    runs-on: ubuntu-latest
    needs: [bundle-analysis, lighthouse, load-test]
    if: always()

    steps:
      - name: Performance Status
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║     GarFiX v1.4 Performance Test Summary        ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "Bundle Analysis:   ${{ needs.bundle-analysis.result }}"
          echo "Lighthouse Audit:  ${{ needs.lighthouse.result }}"
          echo "Load Test:         ${{ needs.load-test.result }}"
          echo ""

          # Fail if Lighthouse or Load Test failed (bundle is advisory)
          if echo "${{ needs.lighthouse.result }}${{ needs.load-test.result }}" | grep -q "failure"; then
            echo "❌ Performance tests FAILED — review findings"
            exit 1
          else
            echo "✅ Performance tests completed"
          fi
