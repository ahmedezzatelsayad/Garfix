# ─────────────────────────────────────────────────────────────────────────────
# GarfiX v1.3 — Security Scan Pipeline
# Runs on push to main + weekly schedule + manual trigger
# Jobs: dependency audit, CodeQL, secret scan, license check
# ─────────────────────────────────────────────────────────────────────────────

name: GarfiX Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Dependency Audit ─────────────────────────────────────────────
  dependency-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Bun audit
        run: |
          echo "─── Bun Package Audit ───"
          bun audit 2>&1 | tee audit-results.txt || true

      - name: Check for known vulnerabilities
        run: |
          echo "─── Checking for critical vulnerabilities ───"
          # Check if audit found any critical/high issues
          if grep -qiE "(critical|high|vulnerability)" audit-results.txt; then
            echo "⚠️ Potential vulnerabilities found — review audit-results.txt"
            echo "VULNERABILITIES_FOUND=true" >> $GITHUB_ENV
          else
            echo "✅ No critical vulnerabilities detected"
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-results
          path: audit-results.txt
          retention-days: 30

  # ── Job 2: CodeQL Analysis ─────────────────────────────────────────────
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  # ── Job 3: Secret Scanning ─────────────────────────────────────────────
  secret-scan:
    name: Secret & Credential Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for thorough scan

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
        continue-on-error: true

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ── Job 4: License Compliance ──────────────────────────────────────────
  license-check:
    name: License Compliance Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.4"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check licenses
        run: |
          echo "─── License Compliance Check ───"
          # List all dependency licenses
          bun pm ls 2>/dev/null | head -50 || true
          echo ""
          echo "Checking for problematic licenses (GPL, AGPL, SSPL)..."
          # Scan for problematic licenses in node_modules
          PROBLEMATIC=0
          if [ -d "node_modules" ]; then
            for pkg in node_modules/*/; do
              if [ -f "$pkg/LICENSE" ] || [ -f "$pkg/license" ]; then
                LICENSE=$(cat "$pkg/LICENSE" "$pkg/license" 2>/dev/null | head -5)
                if echo "$LICENSE" | grep -qiE "(affero general public|gnu general public|server side public|SSPL)"; then
                  echo "⚠️ Copyleft license found: $(basename $pkg)"
                  PROBLEMATIC=1
                fi
              fi
            done
          fi
          if [ "$PROBLEMATIC" -eq 0 ]; then
            echo "✅ No problematic copyleft licenses found"
          fi

  # ── Job 5: Security Summary ────────────────────────────────────────────
  security-summary:
    name: Security Scan Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, codeql, secret-scan, license-check]
    if: always()

    steps:
      - name: Security Scan Status
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║      GarfiX v1.3 Security Scan Summary          ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "Dependency Audit:  ${{ needs.dependency-audit.result }}"
          echo "CodeQL Analysis:   ${{ needs.codeql.result }}"
          echo "Secret Scan:       ${{ needs.secret-scan.result }}"
          echo "License Check:     ${{ needs.license-check.result }}"
          echo ""
          if echo "${{ needs.dependency-audit.result }}${{ needs.codeql.result }}" | grep -q "failure"; then
            echo "❌ Security scan FAILED — review findings"
            exit 1
          else
            echo "✅ Security scan completed"
          fi
