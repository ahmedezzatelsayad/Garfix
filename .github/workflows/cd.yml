# ─────────────────────────────────────────────────────────────────────────────
# GarfiX v1.4 — Continuous Deployment Pipeline
# Triggers on release publish, push to main, or manual dispatch
# Jobs: build → docker → deploy-staging → smoke-test → deploy-production
# ─────────────────────────────────────────────────────────────────────────────

name: GarfiX CD

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/performance.yml"
      - ".github/workflows/security.yml"
      - ".github/workflows/pr-checks.yml"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      version:
        description: "Version to deploy (e.g. v1.4)"
        required: false
        type: string

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Build-time environment variables (not secrets — just needed for `next build`)
  # These are CI-only values; production secrets come from the deployment environment.
  DATABASE_URL: "postgresql://garfix_test:garfix_test_pass@localhost:5432/garfix_test?schema=public"
  DATABASE_DIRECT_URL: "postgresql://garfix_test:garfix_test_pass@localhost:5432/garfix_test"
  JWT_SECRET: "ci-build-jwt-secret-at-least-32-characters-long!!"
  JWT_REFRESH_SECRET: "ci-build-refresh-secret-at-least-32-chars!!"
  FOUNDER_EMAIL: "founder@test.com"
  PAYMENTS_ENC_KEY: "ci-build-encryption-key-at-least-32-characters!"
  NODE_ENV: "test"

jobs:
  # ── Job 1: Build Docker Image ──────────────────────────────────────────
  build-image:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build application
        run: bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=test
            DATABASE_URL=${{ env.DATABASE_URL }}
            DATABASE_DIRECT_URL=${{ env.DATABASE_DIRECT_URL }}
            JWT_SECRET=${{ env.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ env.JWT_REFRESH_SECRET }}
            FOUNDER_EMAIL=${{ env.FOUNDER_EMAIL }}
            PAYMENTS_ENC_KEY=${{ env.PAYMENTS_ENC_KEY }}

      - name: Image digest
        run: echo "Image digest ${{ steps.build.outputs.digest }}"

      - name: Verify Docker image
        run: |
          echo "─── Docker Image Verification ───"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo ""
          # Pull and verify the image starts correctly
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7} 2>/dev/null || \
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main 2>/dev/null || \
            echo "⚠️ Could not pull image for verification (may need registry permissions)"
          echo "✅ Docker image built and pushed successfully"

  # ── Job 2: Deploy to Staging ───────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-image]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'staging') ||
      github.event_name == 'release' ||
      github.event_name == 'push'
    environment:
      name: staging
      url: https://staging.garfix.io
    timeout-minutes: 15

    steps:
      - name: Deploy to staging
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║       GarFiX — Deploying to Staging              ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "Image: ${{ needs.build-image.outputs.image-tag }}"
          echo "Digest: ${{ needs.build-image.outputs.image-digest }}"
          echo "Version: ${{ inputs.version || github.ref_name }}"
          echo ""
          echo "✅ Staging deployment initiated"
          echo "⚠️ Configure your deployment target (SSH, k8s, etc.) in this step"

      - name: Run smoke tests
        run: |
          echo "─── Running Smoke Tests ───"
          # Smoke test 1: Health endpoint
          if [ -n "$STAGING_URL" ]; then
            echo "Testing health endpoint at $STAGING_URL/api/health..."
            # Retry up to 5 times with 10s interval for staging to become ready
            HTTP_CODE="000"
            for i in 1 2 3 4 5; do
              HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$STAGING_URL/api/health" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Health check passed (HTTP $HTTP_CODE)"
                break
              fi
              echo "Attempt $i/5 - got HTTP $HTTP_CODE, retrying in 10s..."
              sleep 10
            done
            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Staging health check failed after 5 attempts (last HTTP $HTTP_CODE)"
              echo "Failing deployment — staging is not healthy"
              exit 1
            fi
          else
            echo "ℹ️ STAGING_URL not configured — skipping live smoke test"
            echo "Configure STAGING_URL secret in the staging environment for live health checks"
            echo "⚠️ Without STAGING_URL, smoke tests are SKIPPED — deployment is NOT verified"
          fi
          echo ""
          echo "✅ Smoke tests completed"

  # ── Job 3: Deploy to Production ────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-image, deploy-staging]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') ||
      (github.event_name == 'release' && needs.deploy-staging.result == 'success')
    environment:
      name: production
      url: https://garfix.io
    timeout-minutes: 20

    steps:
      - name: Deploy to production
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║      GarFiX — Deploying to Production            ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "Image: ${{ needs.build-image.outputs.image-tag }}"
          echo "Digest: ${{ needs.build-image.outputs.image-digest }}"
          echo "Version: ${{ inputs.version || github.ref_name }}"
          echo ""
          echo "✅ Production deployment initiated"
          echo "⚠️ Configure your deployment target (SSH, k8s, etc.) in this step"

      - name: Run production health check
        run: |
          echo "─── Production Health Check ───"
          # Health check with retry logic
          if [ -n "$PRODUCTION_URL" ]; then
            echo "Testing health endpoint at $PRODUCTION_URL/api/health..."
            for i in 1 2 3 4 5; do
              HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$PRODUCTION_URL/api/health" 2>/dev/null || echo "000")
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Health check passed (HTTP $HTTP_CODE)"
                break
              fi
              echo "Attempt $i/5 - got HTTP $HTTP_CODE, retrying in 10s..."
              sleep 10
            done
            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Production health check failed after 5 attempts"
              exit 1
            fi
          else
            echo "ℹ️ PRODUCTION_URL not configured — skipping live health check"
            echo "Configure PRODUCTION_URL secret in the production environment for live health checks"
          fi
          echo ""
          echo "✅ Production health check completed"

  # ── Job 4: Deployment Summary ──────────────────────────────────────────
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-image, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Deployment Status
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║        GarFiX v1.4 Deployment Summary            ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "Image Build:      ${{ needs.build-image.result }}"
          echo "Staging Deploy:   ${{ needs.deploy-staging.result }}"
          echo "Production Deploy: ${{ needs.deploy-production.result }}"
          echo ""
          echo "Version: ${{ inputs.version || github.ref_name }}"
          echo "Trigger: ${{ github.event_name }}"

      - name: Fail if image build failed
        if: needs.build-image.result == 'failure'
        run: |
          echo "❌ Docker image build failed — deployment aborted"
          exit 1
