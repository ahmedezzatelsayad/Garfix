# ─────────────────────────────────────────────────────────────────────────────
# GarFiX — PR Validation Pipeline
# Fast checks on every PR to main — lightweight gate before full CI
# Runs: lint, typecheck, build verification (no tests — CI handles those)
# ─────────────────────────────────────────────────────────────────────────────

name: GarFiX PR Checks

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  DATABASE_URL: "postgresql://garfix_test:garfix_test_pass@localhost:5432/garfix_test?schema=public&connection_limit=5"
  DATABASE_DIRECT_URL: "postgresql://garfix_test:garfix_test_pass@localhost:5432/garfix_test"
  JWT_SECRET: "ci-test-jwt-secret-at-least-32-characters-long!!"
  JWT_REFRESH_SECRET: "ci-test-refresh-secret-at-least-32-chars!!"
  FOUNDER_EMAIL: "founder@test.com"
  PAYMENTS_ENC_KEY: "ci-test-encryption-key-at-least-32-characters!"

jobs:
  # ── Quick Lint ────────────────────────────────────────────────────────
  quick-lint:
    name: 🔍 Quick Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: bun-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bunx eslint src/app src/lib src/modules --format=compact 2>&1 | tee lint-results.txt || true
        continue-on-error: true

  # ── Quick TypeCheck ──────────────────────────────────────────────────
  quick-typecheck:
    name: 📝 Quick TypeCheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: bun-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: TypeScript type check
        run: |
          if [ ! -f tsconfig.prod.json ]; then
            echo '{"extends": "./tsconfig.json", "exclude": ["**/__tests__/**", "**/*.test.ts", "**/*.spec.ts", "**/node_modules/**"]}' > tsconfig.prod.json
          fi

          set +e
          set +o pipefail
          bunx tsc --noEmit -p tsconfig.prod.json 2>&1 | tee typecheck-results.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          set -o pipefail

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Type errors found!"
            exit 1
          else
            echo "✅ No type errors"
          fi

  # ── Quick Build ──────────────────────────────────────────────────────
  quick-build:
    name: 🏗️ Quick Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quick-lint, quick-typecheck]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: bun-modules-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-modules-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bun run db:generate

      - name: Build application
        run: |
          set +e
          set +o pipefail
          bun run build 2>&1 | tee build-results.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          set -o pipefail

          if [ $EXIT_CODE -ne 0 ]; then
            echo "❌ Build failed!"
            exit 1
          else
            echo "✅ Build successful"
          fi

      - name: Verify standalone output
        run: |
          if [ ! -f ".next/standalone/server.js" ]; then
            echo "❌ Standalone server.js missing!"
            exit 1
          fi
          echo "✅ Standalone output verified"

  # ── PR Summary ───────────────────────────────────────────────────────
  pr-summary:
    name: 📋 PR Check Summary
    runs-on: ubuntu-latest
    needs: [quick-lint, quick-typecheck, quick-build]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║        GarFiX PR Check Summary                  ║"
          echo "╚══════════════════════════════════════════════════╝"
          echo ""
          echo "Lint:       ${{ needs.quick-lint.result }}"
          echo "TypeCheck:  ${{ needs.quick-typecheck.result }}"
          echo "Build:      ${{ needs.quick-build.result }}"
          echo ""

          if echo "${{ needs.quick-typecheck.result }}${{ needs.quick-build.result }}" | grep -q "failure"; then
            echo "❌ PR checks FAILED"
            exit 1
          fi

          echo "✅ PR checks PASSED — ready for review"
