# ─────────────────────────────────────────────────────────────────────────────
# GarFiX — Dependabot Configuration
# Automatically checks for dependency updates and creates PRs
#
# IMPORTANT: ignore rules prevent breaking major-version bumps that
# would fail CI (e.g., actions/checkout v7 doesn't exist yet, 
# codeql-action v4 is incompatible with our workflow syntax).
# ─────────────────────────────────────────────────────────────────────────────

version: 2

updates:
  # ── Bun (npm) Dependencies ─────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Africa/Cairo"
    open-pull-requests-limit: 10
    reviewers:
      - "ahmedezzatelsayad"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
    labels:
      - "dependencies"
      - "automated"
    # Group minor/patch updates to reduce PR noise
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    # ── Ignore major-version bumps that break CI ───────────────────────
    # These are pinned because major bumps introduce incompatible changes
    # that cause workflow failures (e.g., removed options, changed syntax).
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@prisma/client"
        update-types: ["version-update:semver-major"]
      - dependency-name: "prisma"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "zod"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tanstack/react-query"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@tanstack/react-table"
        update-types: ["version-update:semver-major"]
      - dependency-name: "bullmq"
        update-types: ["version-update:semver-major"]

  # ── GitHub Actions ─────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Africa/Cairo"
    open-pull-requests-limit: 5
    reviewers:
      - "ahmedezzatelsayad"
    commit-message:
      prefix: "ci"
    labels:
      - "github-actions"
      - "dependencies"
    # ── Pin action versions to prevent breaking upgrades ────────────────
    # actions/checkout v4 → v7 doesn't exist (Dependabot hallucinated)
    # github/codeql-action v3 → v4 breaks init/analyze syntax
    # docker/metadata-action v5 → v6 breaks tag templates
    # gitleaks-action v2 → v3 changes configuration format
    # actions/cache v4 → v6 doesn't exist yet
    ignore:
      - dependency-name: "actions/checkout"
        update-types: ["version-update:semver-major"]
      - dependency-name: "github/codeql-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "docker/metadata-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "gitleaks/gitleaks-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/cache"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/upload-artifact"
        update-types: ["version-update:semver-major"]
      - dependency-name: "actions/setup-node"
        update-types: ["version-update:semver-major"]
      - dependency-name: "docker/setup-buildx-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "docker/login-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "docker/build-push-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "oven-sh/setup-bun"
        update-types: ["version-update:semver-major"]
      - dependency-name: "treosh/lighthouse-ci-action"
        update-types: ["version-update:semver-major"]
      - dependency-name: "trufflesecurity/trufflehog"
        versions: [">3.88.0"]  # Pin to v3.88.0 for stability

  # ── Docker ─────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Africa/Cairo"
    open-pull-requests-limit: 3
    reviewers:
      - "ahmedezzatelsayad"
    commit-message:
      prefix: "docker"
    labels:
      - "docker"
      - "dependencies"
    ignore:
      - dependency-name: "oven/bun"
        update-types: ["version-update:semver-major"]
      - dependency-name: "node"
        update-types: ["version-update:semver-major"]
