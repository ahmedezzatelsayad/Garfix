# ─────────────────────────────────────────────────────────────────────────────
# GarFiX — Dependabot Configuration
# Automatically checks for dependency updates and creates PRs
# ─────────────────────────────────────────────────────────────────────────────

version: 2

updates:
  # ── Bun (npm) Dependencies ─────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Africa/Cairo"
    open-pull-requests-limit: 10
    reviewers:
      - "ahmedezzatelsayad"
    commit-message:
      prefix: "deps"
      prefix-development: "deps(dev)"
    labels:
      - "dependencies"
      - "automated"
    # Group minor/patch updates to reduce PR noise
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions ─────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Africa/Cairo"
    open-pull-requests-limit: 5
    reviewers:
      - "ahmedezzatelsayad"
    commit-message:
      prefix: "ci"
    labels:
      - "github-actions"
      - "dependencies"

  # ── Docker ─────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "Africa/Cairo"
    open-pull-requests-limit: 3
    reviewers:
      - "ahmedezzatelsayad"
    commit-message:
      prefix: "docker"
    labels:
      - "docker"
      - "dependencies"
