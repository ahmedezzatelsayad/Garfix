  # ─── WEBHOOKS ──────────────────────────────────────────────────────────
  /webhooks/whatsapp:
    get:
      tags: [Webhooks]
      summary: WhatsApp webhook verification
      description: |
        Meta webhook subscription verification. Compares `hub.verify_token`
        against platform env var or company hashed tokens.
      security: []
      parameters:
        - name: hub.mode
          in: query
          required: true
          schema:
            type: string
            enum: [subscribe]
        - name: hub.challenge
          in: query
          required: true
          schema:
            type: string
        - name: hub.verify_token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Verification challenge echoed back
          content:
            text/plain:
              schema:
                type: string
        '400':
          description: Invalid verification request
        '403':
          description: Token mismatch

    post:
      tags: [Webhooks]
      summary: WhatsApp incoming messages
      description: |
        Receives incoming WhatsApp messages from Meta. Verifies x-hub-signature-256
        HMAC-SHA256. Routes messages to the correct company by phone_number_id.
      security: []
      responses:
        '200':
          description: Message processed (always 200 to prevent Meta retries)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok, ignored, error]
        '403':
          description: Missing signature or invalid signature

