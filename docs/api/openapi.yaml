components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token (also set as HttpOnly cookie)
    cookieAuth:
      type: cookie
      name: __garfix_access
      description: HttpOnly JWT access cookie (set by login/refresh)

  parameters:
    InvoiceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Invoice ID
    ClientId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Client ID
    CompanySlugHeader:
      name: X-Company-Slug
      in: header
      schema:
        type: string
      description: Multi-tenant company scope header

  responses:
    BadRequest:
      description: Invalid input or validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Unauthorized"
    Forbidden:
      description: Insufficient permissions or company access
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "ليس لديك صلاحية: view_invoices"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: "Invoice not found"
    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Rate limit exceeded"

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message (Arabic or English)
        code:
          type: string
          description: Optional error code for programmatic handling

    UserProfile:
      type: object
      properties:
        uid:
          type: string
          format: uuid
        email:
          type: string
          format: email
        displayName:
          type: string
          description: الاسم المعروض
        role:
          type: string
          enum: [admin, manager, accountant, employee, viewer]
        companies:
          type: array
          items:
            type: string
          description: List of company slugs the user has access to
        permissions:
          type: object
          additionalProperties:
            type: number
          description: Permission bits map
        emailVerified:
          type: boolean
        tokenVersion:
          type: integer
        isFounder:
          type: boolean

    Invoice:
      type: object
      properties:
        id:
          type: integer
        companySlug:
          type: string
        invoiceNumber:
          type: string
          description: رقم الفاتورة
        clientId:
          type: integer
          nullable: true
        clientName:
          type: string
          description: اسم العميل
        clientEmail:
          type: string
          nullable: true
        clientPhone:
          type: string
          nullable: true
        clientAddress:
          type: string
          nullable: true
        issueDate:
          type: string
          description: تاريخ الإصدار
