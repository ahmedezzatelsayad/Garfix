  # ─── REPORTS ──────────────────────────────────────────────────────────
  /reports:
    get:
      tags: [Reports]
      summary: Generate business report (تقرير الأعمال)
      description: |
        Generate sales, profit, cash flow, or tax reports with CSV export support.
        Requires `reports_access` permission.
      parameters:
        - name: companySlug
          in: query
          required: true
          schema:
            type: string
          description: companySlug مطلوب
        - name: type
          in: query
          schema:
            type: string
            enum: [sales, profit, cashflow, tax]
            default: sales
          description: Report type
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Start date (YYYY-MM-DD)
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: End date (YYYY-MM-DD)
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
          description: Output format (CSV includes UTF-8 BOM for Arabic)
      responses:
        '200':
          description: Report data (JSON or CSV)
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                  companySlug:
                    type: string
                  dateRange:
                    type: object
                    properties:
                      from:
                        type: string
                      to:
                        type: string
                  summary:
                    type: object
                    additionalProperties: true
                  rows:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  count:
                    type: integer
            text/csv:
              schema:
                type: string

  # ─── HEALTH ────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: System health check (فحص صحة النظام)
      description: |
        Unauthenticated. Checks PostgreSQL, Valkey, BullMQ queues, disk, memory.
        Returns 200 when critical services healthy, 503 when degraded.
      security: []
      responses:
        '200':
          description: All critical services healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  version:
                    type: string
                    example: "12.0.0"
                  uptime:
                    type: integer
                    description: Process uptime in seconds
                  latencyMs:
                    type: integer
                  checks:
                    type: object
                    properties:
                      db:
                        type: object
                        properties:
                          ok:
                            type: boolean
                          error:
                            type: string
                      valkey:
                        type: object
                        properties:
                          ok:
                            type: boolean
                      queues:
                        type: object
                        description: BullMQ stats (non-critical)
                      cache:
                        type: object
                        description: Cache stats
                      memory:
                        type: object
                        properties:
                          rssMB:
                            type: integer
                          heapMB:
                            type: integer
                          systemTotalMB:
                            type: integer
                          rssPercent:
                            type: string
                      disk:
                        type: object
                        properties:
                          ok:
                            type: boolean
                  timestamp:
                    type: string
                    format: date-time
        '503':
          description: Critical service degraded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [degraded]
                  checks:
                    type: object

