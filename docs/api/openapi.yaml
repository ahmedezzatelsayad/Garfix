openapi: 3.1.0
info:
  title: Garfix EOS API
  description: |
    Garfix EOS — منصة إدارة الأعمال المتكاملة (Enterprise Operating System)
    
    A multi-tenant ERP/SaaS platform for managing invoices, clients, inventory,
    accounting, HR, automation, and AI-powered business intelligence. Designed
    for Gulf-region businesses with Kuwait Decree 10/2026 e-invoicing compliance,
    Arabic-first UI, and RTL support.
    
    **Authentication**: JWT Bearer tokens via HttpOnly cookies (access + refresh).
    **Multi-Tenancy**: Scoped via `companySlug` query param or `X-Company-Slug` header.
    **Permissions**: Role-based with granular permission bits (view_invoices, finance_access, etc.)
    **Rate Limiting**: Applied per-IP and per-user on sensitive endpoints.
  version: 12.0.0
  contact:
    name: Garfix Engineering
    email: dev@garfix.io
  license:
    name: Proprietary
    url: https://garfix.io/terms

servers:
  - url: https://app.garfix.io/api
    description: Production
  - url: http://localhost:3000/api
    description: Local development

tags:
  - name: Auth
    description: Authentication & session management (تسجيل الدخول والجلسات)
  - name: Invoices
    description: Invoice CRUD + payment/status workflows (الفواتير)
  - name: Clients
    description: Client/customer management (العملاء)
  - name: Catalog
    description: Product catalog management (كتالوج المنتجات)
  - name: Inventory
    description: Warehouses, items, stock levels, movements (المخزون والمستودعات)
  - name: Accounting
    description: Journal entries, financial statements, banking (المحاسبة والمالية)
  - name: HR
    description: Employees, salaries, attendance, leaves (الموارد البشرية)
  - name: AI
    description: AI Copilot chat, image parsing, invoice brain (الذكاء الاصطناعي)
  - name: Dashboard
    description: KPI dashboard stats (لوحة القيادة)
  - name: Settings
    description: Platform settings (founder-only for write) (الإعدادات)
  - name: Automation
    description: Automation rules engine (الأتمتة)
  - name: Webhooks
    description: External webhook receivers (WhatsApp, etc.) (ويب هوك)
  - name: SaaS
    description: SaaS billing, payments, subscriptions (إدارة الاشتراكات)
  - name: Reports
    description: Business reports (sales, profit, cash flow, tax) (التقارير)
  - name: Health
    description: System health & monitoring (الصحة والمراقبة)
  - name: Companies
    description: Multi-company/tenant management (الشركات)

security:
  - bearerAuth: []
  - cookieAuth: []

paths:
  # ─── AUTH ─────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login (تسجيل الدخول)
      description: |
        Validates credentials, issues access + refresh cookies, returns user profile.
        Rate-limited: 5 attempts per 15 min per IP AND per email.
        Account lockout after 5 failures.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  description: البريد الإلكتروني
                  example: user@example.com
                password:
                  type: string
                  minLength: 1
                  description: كلمة المرور
                  example: StrongP@ssw0rd!
      responses:
        '200':
          description: Login successful — cookies set
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials (البريد الإلكتروني أو كلمة المرور غير صحيحة)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "البريد الإلكتروني أو كلمة المرور غير صحيحة"
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/register:
    post:
      tags: [Auth]
      summary: Register (إنشاء حساب)
      description: |
        Creates a new user account. Anti-enumeration: always returns 200 with a
        generic message whether or not the email was already registered.
        Password policy: 10+ chars, upper/lower/digit/symbol, score ≥ 40.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, displayName]
              properties:
                email:
                  type: string
                  format: email
                  description: صيغة البريد الإلكتروني غير صحيحة
                  example: newuser@example.com
                password:
                  type: string
                  minLength: 10
                  description: كلمة المرور (10+ chars, upper/lower/digit/symbol)
                  example: StrongP@ssw0rd!
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 100
                  description: الاسم مطلوب
                  example: أحمد محمد
      responses:
        '200':
          description: Generic anti-enumeration response
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "إذا كان البريد غير مسجّل، تم إنشاء الحساب. تحقق من بريدك لتأكيد الحساب."
                  uid:
                    type: string
                    format: uuid
                    description: New user UID (only present on actual creation)
                  isFounder:
                    type: boolean
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile (الملف الشخصي)
      responses:
        '200':
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  user:
                    $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token (تجديد الجلسة)
      security: []
      responses:
        '200':
          description: New access cookie issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '401':
          description: Refresh token expired or invalid

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (تسجيل الخروج)
      description: Clears both access and refresh cookies, increments tokenVersion.
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password (تغيير كلمة المرور)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 10
      responses:
        '200':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Forgot password (نسيت كلمة المرور)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent (or silently ignored if email not found)

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token (إعادة تعيين كلمة المرور)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        '200':
          description: Password reset successful

  /auth/csrf:
    get:
      tags: [Auth]
      summary: Get CSRF token (رمز الحماية)
      security: []
      responses:
        '200':
          description: CSRF token
          content:
            application/json:
              schema:
                type: object
                properties:
                  csrfToken:
                    type: string

  # ─── INVOICES ────────────────────────────────────────────────────────
  /invoices:
    get:
      tags: [Invoices]
      summary: List invoices (قائمة الفواتير)
      description: |
        List invoices with cursor-based pagination, filterable by company, status, and search.
        Requires `view_invoices` permission.
      parameters:
        - name: companySlug
          in: query
          schema:
            type: string
          description: Tenant company slug
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, overdue, cancelled, paid, partial]
          description: Filter by invoice status
        - name: search
          in: query
          schema:
            type: string
          description: Search invoice number, client name, email, phone
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 500
        - name: cursor
          in: query
          schema:
            type: string
          description: Cursor-based pagination (invoice ID)
      responses:
        '200':
          description: Invoice list
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Invoice'
                  nextCursor:
                    type: string
                    nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Invoices]
      summary: Create invoice (إنشاء فاتورة)
      description: |
        Create a new invoice. Requires `create_invoice` permission.
        Enforces trial expiry and invoice quota (SaaS limits).
        Kuwait companies: auto-validates Decree 10/2026 compliance fields.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceCreate'
      responses:
        '200':
          description: Invoice created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  invoice:
                    $ref: '#/components/schemas/Invoice'
                  reviewQueueWarnings:
                    type: array
                    items:
                      type: string
                  warnings:
                    type: array
                    items:
                      type: string
                  kuwaitWarnings:
                    type: array
                    items:
                      type: object
                      properties:
                        field:
                          type: string
                        messageAr:
                          type: string
                        messageEn:
                          type: string
        '400':
          description: Validation error or Kuwait compliance error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    enum: [KUWAIT_COMPLIANCE_ERROR]
                  details:
                    type: array
        '402':
          description: Trial expired or quota exceeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    enum: [TRIAL_EXPIRED, QUOTA_EXCEEDED]
        '409':
          description: Invoice number already exists in company
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "رقم الفاتورة مستخدم مسبقاً في هذه الشركة"

  /invoices/{id}:
    get:
      tags: [Invoices]
      summary: Get invoice (عرض فاتورة)
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      responses:
        '200':
          description: Invoice details
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoice:
                    $ref: '#/components/schemas/Invoice'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Invoices]
      summary: Update invoice (تحديث فاتورة)
      description: |
        Update invoice with optimistic-lock version check. `status` changes are NOT
        allowed here — use `/invoices/{id}/status` or `/invoices/{id}/payment`.
        Requires `edit_invoice` permission.
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvoiceUpdate'
      responses:
        '200':
          description: Invoice updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  invoice:
                    $ref: '#/components/schemas/Invoice'
                  kuwaitWarnings:
                    type: array
                    items:
                      type: object
        '409':
          description: Version conflict — concurrent edit or soft-delete
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  code:
                    type: string
                    enum: [VERSION_CONFLICT]

    delete:
      tags: [Invoices]
      summary: Soft-delete invoice (حذف فاتورة)
      description: Soft-delete (sets deletedAt). Kuwait invoices: retention check logged.
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      responses:
        '200':
          description: Invoice soft-deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '404':
          $ref: '#/components/responses/NotFound'

  /invoices/{id}/status:
    patch:
      tags: [Invoices]
      summary: Change invoice status (تغيير حالة الفاتورة)
      description: |
        Operational status transitions only (draft → sent, sent → overdue, etc.).
        Requires `edit_invoice` permission. `paid`/`partial` must go through `/payment`.
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [draft, sent, overdue, cancelled]
      responses:
        '200':
          description: Status updated

  /invoices/{id}/payment:
    patch:
      tags: [Invoices]
      summary: Record payment on invoice (تسجيل دفعة)
      description: |
        Update invoice to paid/partial status with payment amount. Requires `finance_access`.
        Creates payment audit trail.
      parameters:
        - $ref: '#/components/parameters/InvoiceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paidAmount]
              properties:
                paidAmount:
                  type: number
                  description: Amount paid
                paymentMethod:
                  type: string
                reference:
                  type: string
      responses:
        '200':
          description: Payment recorded

  # ─── CLIENTS ──────────────────────────────────────────────────────────
  /clients:
    get:
      tags: [Clients]
      summary: List clients (قائمة العملاء)
      description: Requires `view_customers` permission.
      parameters:
        - name: companySlug
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
          description: Search name, email, phone, company
      responses:
        '200':
          description: Client list
          content:
            application/json:
              schema:
                type: object
                properties:
                  clients:
                    type: array
                    items:
                      $ref: '#/components/schemas/Client'
                  nextCursor:
                    type: string
                    nullable: true

    post:
      tags: [Clients]
      summary: Create client (إنشاء عميل)
      description: Requires `edit_customer` permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '200':
          description: Client created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  client:
                    $ref: '#/components/schemas/Client'

  /clients/{id}:
    get:
      tags: [Clients]
      summary: Get client (عرض عميل)
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Client details
          content:
            application/json:
              schema:
                type: object
                properties:
                  client:
                    $ref: '#/components/schemas/Client'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Clients]
      summary: Update client (تحديث عميل)
      parameters:
        - $ref: '#/components/parameters/ClientId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientUpdate'
      responses:
        '200':
          description: Client updated

    delete:
      tags: [Clients]
      summary: Soft-delete client (حذف عميل)
      description: Soft-delete (sets deletedAt timestamp).
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Client soft-deleted

  /clients/{id}/profile:
    get:
      tags: [Clients]
      summary: Get client profile with invoices summary
      parameters:
        - $ref: '#/components/parameters/ClientId'
      responses:
        '200':
          description: Client profile

  # ─── CATALOG ──────────────────────────────────────────────────────────
  /catalog:
    get:
      tags: [Catalog]
      summary: List products (قائمة المنتجات)
      description: Requires `view_catalog` permission.
      parameters:
        - name: companySlug
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
          description: Search product name or code
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
                  nextCursor:
                    type: string
                    nullable: true

    post:
      tags: [Catalog]
      summary: Create product (إنشاء منتج)
      description: Requires `settings_access` permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '200':
          description: Product created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  product:
                    $ref: '#/components/schemas/Product'

  /catalog/{id}:
    patch:
      tags: [Catalog]
      summary: Update product (تحديث منتج)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product updated

    delete:
      tags: [Catalog]
      summary: Delete product (حذف منتج)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Product deleted

  # ─── INVENTORY ─────────────────────────────────────────────────────────
  /inventory/warehouses:
    get:
      tags: [Inventory]
      summary: List warehouses (قائمة المستودعات)
      description: Requires `settings_access` permission.
      parameters:
        - name: companySlug
          in: query
          required: true
          schema:
            type: string
          description: companySlug مطلوب
      responses:
        '200':
          description: Warehouse list with item counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  warehouses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Warehouse'

    post:
      tags: [Inventory]
      summary: Create warehouse (إنشاء مستودع)
      description: Requires `settings_access` permission. Warehouse code must be unique per company.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseCreate'
      responses:
        '201':
          description: Warehouse created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  warehouse:
                    $ref: '#/components/schemas/Warehouse'
        '409':
          description: Warehouse code already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "كود المستودع مستخدم بالفعل"

  /inventory/warehouses/{id}:
    patch:
      tags: [Inventory]
      summary: Update warehouse (تحديث مستودع)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Warehouse updated
    delete:
      tags: [Inventory]
      summary: Delete warehouse (حذف مستودع)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Warehouse deleted

  /inventory/items:
    get:
      tags: [Inventory]
      summary: List inventory items with stock status (قائمة المخزون)
      description: |
        Returns inventory items with computed status (OK/Low/Out).
        Requires `settings_access` permission.
      parameters:
        - name: companySlug
          in: query
          required: true
          schema:
            type: string
          description: companySlug مطلوب
        - name: warehouseId
          in: query
          schema:
            type: integer
          description: Filter by warehouse
        - name: status
          in: query
          schema:
            type: string
            enum: [OK, Low, Out]
          description: Filter by stock status
      responses:
        '200':
          description: Inventory items with summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/InventoryItem'
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      ok:
                        type: integer
                      low:
                        type: integer
                      out:
                        type: integer

    post:
      tags: [Inventory]
      summary: Adjust stock (تعديل المخزون)
      description: |
        Set absolute quantity or adjust by delta (+/-). Creates or updates InventoryItem.
        Records StockMovement ledger entry. Cannot go below zero.
        Requires `settings_access` permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryAdjust'
      responses:
        '200':
          description: Stock adjusted (existing item updated)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  item:
                    $ref: '#/components/schemas/InventoryItem'
        '201':
          description: New inventory item created
        '400':
          description: Cannot go below zero
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "لا يمكن تقليل المخزون تحت الصفر"

  /inventory/movements:
    get:
      tags: [Inventory]
      summary: List stock movements (سجل حركة المخزون)
      parameters:
        - name: companySlug
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Movement list

  # ─── ACCOUNTING ────────────────────────────────────────────────────────
  /accounting/journal-entries:
    get:
      tags: [Accounting]
      summary: List journal entries (قائمة القيود المحاسبية)
      description: Requires `finance_access` permission.
      parameters:
        - name: companySlug
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Journal entries with lines
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/JournalEntry'

    post:
      tags: [Accounting]
      summary: Create journal entry (إنشاء قيد محاسبي)
      description: |
        Requires `finance_access` permission. Entry must be balanced (debit = credit).
        If status='posted', account balances are updated atomically within transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema:
