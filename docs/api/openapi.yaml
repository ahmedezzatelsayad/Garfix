                      $ref: '#/components/schemas/AutomationRule'

    post:
      tags: [Automation]
      summary: Create automation rule (إنشاء قاعدة أتمتة)
      description: Requires `settings_access` permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AutomationRuleCreate'
      responses:
        '201':
          description: Rule created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  rule:
                    $ref: '#/components/schemas/AutomationRule'

  /automation/{id}:
