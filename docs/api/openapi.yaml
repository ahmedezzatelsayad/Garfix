          schema:
            type: string
      responses:
        '200':
          description: Chat messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        userUid:
                          type: string
                        companySlug:
                          type: string
                        role:
                          type: string
                          enum: [user, assistant, system]
                        content:
                          type: string
                        conversationId:
                          type: string
                        model:
                          type: string
                        createdAt:
                          type: string
                          format: date-time

    post:
      tags: [AI]
      summary: AI Copilot chat (محادثة الذكاء الاصطناعي)
      description: |
        Sends messages to the AI Copilot. Rate-limited: 10/min per user.
        Injects real-time business context (invoices, clients, revenue).
        Uses Smart Router with automatic provider fallback and cost optimizer cache.
        Requires `view_invoices` permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role:
                        type: string
                        enum: [user, assistant, system]
                      content:
                        type: string
                        minLength: 1
                companySlug:
                  type: string
                  description: Optional company context for business-aware replies
                conversationId:
                  type: string
                  description: Continuation of an existing conversation
      responses:
        '200':
          description: AI reply
          content:
            application/json:
              schema:
                type: object
                properties:
                  reply:
                    type: string
                    description: AI assistant response
                  conversationId:
                    type: string
                  meta:
                    type: object
                    properties:
                      processingMs:
                        type: integer
                      tokensIn:
                        type: integer
                      tokensOut:
                        type: integer
                      model:
                        type: string
                        example: "cache-hit"
                      source:
                        type: string
                        enum: [cache, ai]
        '429':
          $ref: '#/components/responses/RateLimited'

  /ai/parse-image:
    post:
      tags: [AI]
      summary: Parse invoice image (تحليل صورة فاتورة)
      description: |
        Takes a base64-encoded image and uses VLM to extract structured invoice drafts.
        Rate-limited per user. Requires `bulk_input` permission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [imageBase64]
              properties:
                imageBase64:
                  type: string
                  minLength: 100
                  description: Base64-encoded image (receipt, invoice, handwritten order)
                mimeType:
                  type: string
                  default: image/jpeg
                  description: Image MIME type
                companySlug:
                  type: string
                  description: Company slug for context + auto-product-add
                autoAddProducts:
                  type: boolean
                  default: false
                  description: Auto-add discovered products to catalog
      responses:
        '200':
          description: Parsed orders from image
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/ParsedOrder'
                  meta:
                    type: object
                    properties:
                      processingMs:
                        type: integer
                      aiMs:
                        type: integer
                      inputTokens:
                        type: integer
                      outputTokens:
                        type: integer
                      totalTokens:
                        type: integer
                      model:
                        type: string
                        example: z-ai-vlm
                      ordersCount:
                        type: integer
                      itemsCount:
                        type: integer
        '502':
          description: AI response was invalid JSON
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "رد الذكاء الاصطناعي غير صالح (JSON)"
                  raw:
                    type: string

  /ai/smart-parse:
    post:
      tags: [AI]
