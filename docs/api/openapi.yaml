  # ─── DASHBOARD ─────────────────────────────────────────────────────────
  /dashboard/stats:
    get:
      tags: [Dashboard]
      summary: Dashboard KPI stats (إحصائيات لوحة القيادة)
      description: |
        Returns aggregated KPIs: total invoices, revenue, paid, outstanding,
        client count, monthly breakdown, recent invoices. Cached 30s per user+company.
      parameters:
        - name: companySlug
          in: query
          schema:
            type: string
        - name: fresh
          in: query
          schema:
            type: string
            enum: ["1"]
          description: Bypass cache (bypass=1)
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalInvoices:
                    type: integer
                  totalRevenue:
                    type: number
                  totalPaid:
                    type: number
                  totalOutstanding:
                    type: number
                  clientsCount:
                    type: integer
                  byStatus:
                    type: object
                    additionalProperties:
                      type: integer
                    description: Invoice count per status
                  monthly:
                    type: array
                    items:
                      type: object
                      properties:
                        month:
                          type: string
                          example: "2025-07"
                        revenue:
                          type: number
                        count:
                          type: integer
                  recent:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        invoiceNumber:
                          type: string
                        clientName:
                          type: string
                        status:
                          type: string
                        total:
                          type: number
                        paid:
                          type: number
                        issueDate:
                          type: string
                        companySlug:
                          type: string

  # ─── SETTINGS ─────────────────────────────────────────────────────────
  /settings:
    get:
      tags: [Settings]
      summary: Get platform settings (الإعدادات)
      description: |
        Returns platform settings. Non-founder/non-admin users only see public settings
        (plans.catalog, feature.public_signup, branding.*). Founder/admin sees all.
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  settings:
                    type: object
                    additionalProperties: true
                  defaults:
                    type: object
                    properties:
                      "plans.catalog":
                        type: object
                      "feature.public_signup":
                        type: boolean
                      "branding.name":
                        type: string
                        example: "GARFIX"
                      "branding.tagline":
                        type: string
                        example: "منصة إدارة الأعمال المتكاملة"
                      "branding.primary_color":
                        type: string
                        example: "#7c3aed"

    patch:
      tags: [Settings]
      summary: Update settings (تحديث الإعدادات)
      description: Founder-only. Updates arbitrary key/value pairs.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Key-value pairs to update
              example:
                "branding.name": "MyCompany"
                "feature.public_signup": false
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '403':
          description: Founder only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: "Founder only"

  # ─── AUTOMATION ────────────────────────────────────────────────────────
  /automation:
    get:
      tags: [Automation]
      summary: List automation rules (قائمة قواعد الأتمتة)
      description: Requires `settings_access` permission.
      parameters:
